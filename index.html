<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prode Clan Waltner 🏆</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --negro: #1a1028;
      --violeta: #6c3fc5;
      --violeta-claro: #ede7fb;
      --amarillo: #f5c800;
      --naranja: #ff6b35;
      --verde: #2ec27e;
      --verde-claro: #e4f9f0;
      --rojo: #e84040;
      --rojo-claro: #fdeaea;
      --gris: #f3f1f8;
      --gris-borde: #ddd8ee;
      --texto: #1a1028;
      --texto-suave: #7a6f99;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--negro);
      color: var(--texto);
      min-height: 100vh;
    }

    /* ══ LOGIN ══ */
    #view-login {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .login-card {
      background: white;
      border-radius: 28px;
      padding: 3rem 2.5rem 2.5rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      border: 3px solid var(--amarillo);
      box-shadow: 8px 8px 0px var(--amarillo);
    }
    .login-trofeo {
      font-size: 4rem;
      display: block;
      margin-bottom: 0.5rem;
      animation: bounce 1.2s infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0) rotate(-5deg); }
      to   { transform: translateY(-12px) rotate(5deg); }
    }
    .login-titulo {
      font-family: 'Boogaloo', sans-serif;
      font-size: 2.6rem;
      color: var(--violeta);
      line-height: 1;
      margin-bottom: 0.2rem;
    }
    .login-clan {
      font-family: 'Boogaloo', sans-serif;
      font-size: 1.8rem;
      color: var(--naranja);
      margin-bottom: 0.5rem;
    }
    .login-sub {
      color: var(--texto-suave);
      font-size: 0.88rem;
      margin-bottom: 2rem;
      font-weight: 700;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px;
      border: 2.5px solid var(--gris-borde);
      border-radius: 14px;
      background: white;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-google:hover {
      background: var(--violeta);
      color: white;
      border-color: var(--violeta);
      transform: translateY(-2px);
      box-shadow: 0 4px 0 #4a2a9a;
    }
    .btn-google svg { width: 22px; height: 22px; flex-shrink: 0; }

    /* ══ HEADER ══ */
    header {
      background: var(--violeta);
      color: white;
      padding: 0 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 62px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 4px solid var(--amarillo);
    }
    .header-logo {
      font-family: 'Boogaloo', sans-serif;
      font-size: 1.45rem;
      line-height: 1;
      display: flex;
      flex-direction: column;
    }
    .header-logo .sub {
      font-size: 0.68rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      opacity: 0.75;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--amarillo);
      color: var(--negro);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900;
      font-size: 0.85rem;
      border: 2px solid white;
    }
    #btn-logout {
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.35);
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.78rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      transition: background 0.2s;
    }
    #btn-logout:hover { background: rgba(255,255,255,0.28); }

    /* ══ TABS ══ */
    .tabs {
      display: flex;
      background: #231840;
      padding: 0 1rem;
      gap: 4px;
      overflow-x: auto;
    }
    .tab {
      padding: 10px 16px;
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
      user-select: none;
    }
    .tab.active { color: var(--amarillo); border-bottom-color: var(--amarillo); }
    .tab:hover:not(.active) { color: rgba(255,255,255,0.8); }

    /* ══ VIEWS ══ */
    .view { display: none; padding: 1.2rem; max-width: 700px; margin: 0 auto; }
    .view.active { display: block; }
    
    #view-pronosticos { padding-bottom: 140px; }

    .seccion-titulo {
      font-family: 'Boogaloo', sans-serif;
      font-size: 1.6rem;
      color: var(--amarillo);
      margin-bottom: 1rem;
    }

    /* ══ FRASE ══ */
    .frase-card {
      background: var(--amarillo);
      border-radius: 16px;
      padding: 14px 18px;
      margin-bottom: 1rem;
      font-family: 'Boogaloo', sans-serif;
      font-size: 1.1rem;
      color: #5a4000;
      text-align: center;
      border: 2.5px solid #d4a800;
      animation: wiggle 3s infinite;
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(-0.5deg); }
      50% { transform: rotate(0.5deg); }
    }

    /* ══ FASE LABEL ══ */
    .fase-label {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: var(--violeta);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      margin: 1.2rem 0 0.6rem;
    }

    /* ══ TARJETA PARTIDO ══ */
    .partido-card {
      background: white;
      border-radius: 20px;
      border: 2.5px solid var(--gris-borde);
      margin-bottom: 12px;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .partido-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,63,197,0.15); }
    .partido-card.finalizado { border-color: var(--verde); }
    .partido-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 14px 12px;
      gap: 6px;
      position: relative;
    }
    .equipo {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 0;
    }
    .equipo-bandera-img {
      width: 44px;
      height: 30px;
      object-fit: cover;
      border-radius: 6px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
      border: 1px solid var(--gris-borde);
    }
    .equipo-nombre {
      font-size: 0.75rem;
      font-weight: 800;
      text-align: center;
      margin-top: 5px;
      color: var(--texto);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 90px;
    }
    .vs-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
      padding: 0 6px;
    }
    .vs-texto { font-family: 'Boogaloo', sans-serif; font-size: 1.3rem; color: var(--texto-suave); }
    .partido-fecha { font-size: 0.68rem; color: var(--texto-suave); font-weight: 700; text-align: center; }
    .resultado-real {
      font-family: 'Boogaloo', sans-serif;
      font-size: 2rem;
      color: var(--violeta);
      letter-spacing: 2px;
      line-height: 1;
    }
    .mi-pron { font-size: 0.68rem; font-weight: 800; color: var(--texto-suave); text-align: center; margin-top: 2px; }

    /* ══ BADGE PUNTOS ══ */
    .badge-pts {
      position: absolute;
      top: 8px; right: 10px;
      font-size: 0.72rem;
      font-weight: 900;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .pts-3 { background: var(--amarillo); color: #7a5800; }
    .pts-1 { background: var(--verde-claro); color: #1a7a50; }
    .pts-0 { background: var(--rojo-claro); color: var(--rojo); }

    /* ══ PRONÓSTICO AREA ══ */
    .pronostico-area {
      background: var(--gris);
      border-top: 2px dashed var(--gris-borde);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pronostico-label { font-size: 0.75rem; color: var(--texto-suave); font-weight: 800; white-space: nowrap; }
    .score-inputs { display: flex; align-items: center; gap: 6px; flex: 1; }
    .score-input {
      width: 46px; height: 40px;
      border: 2.5px solid var(--gris-borde);
      border-radius: 10px;
      text-align: center;
      font-size: 1.15rem;
      font-weight: 900;
      font-family: 'Nunito', sans-serif;
      background: white;
      outline: none;
      transition: border-color 0.2s, transform 0.1s;
      -moz-appearance: textfield;
      appearance: textfield;
      color: var(--violeta);
    }
    .score-input::-webkit-outer-spin-button,
    .score-input::-webkit-inner-spin-button { -webkit-appearance: none; appearance: none; margin: 0; }
    .score-input:focus { border-color: var(--violeta); transform: scale(1.05); }
    .score-sep { font-family: 'Boogaloo', sans-serif; font-size: 1.3rem; color: var(--texto-suave); }
    .btn-guardar {
      padding: 9px 14px;
      background: var(--violeta);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      box-shadow: 0 3px 0 #4a2a9a;
    }
    .btn-guardar:hover { background: #5a32a8; transform: translateY(-1px); }
    .btn-guardar:active { transform: translateY(2px); box-shadow: none; }
    .btn-guardar:disabled { background: #ccc; box-shadow: none; cursor: default; transform: none; }

    /* ══ POSICIONES ══ */
    .tabla-pos { background: white; border-radius: 20px; border: 2.5px solid var(--gris-borde); overflow: hidden; }
    .tabla-pos table { width: 100%; border-collapse: collapse; }
    .tabla-pos thead { background: var(--violeta); }
    .tabla-pos th {
      font-size: 0.72rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px;
      color: rgba(255,255,255,0.85); padding: 11px 12px; text-align: left;
    }
    .tabla-pos th:not(:first-child) { text-align: center; }
    .tabla-pos td { padding: 12px; font-size: 0.9rem; font-weight: 700; border-bottom: 1.5px solid var(--gris-borde); }
    .tabla-pos tr:last-child td { border-bottom: none; }
    .tabla-pos td:not(:first-child) { text-align: center; }
    .pos-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; border-radius: 8px;
      font-size: 0.82rem; font-weight: 900; margin-right: 8px;
    }
    .pos-1 { background: var(--amarillo); color: #7a5800; font-size: 1rem; }
    .pos-2 { background: #e8e8ee; color: #555; }
    .pos-3 { background: #fde8d3; color: #8a4010; }
    .pos-n { background: var(--gris); color: var(--texto-suave); }
    .pts-total { font-family: 'Boogaloo', sans-serif; font-size: 1.4rem; color: var(--violeta); }
    .yo-row { background: var(--violeta-claro); }
    .yo-row .pts-total { color: var(--naranja); }

    /* ══ ADMIN ══ */
    .admin-card { background: white; border-radius: 18px; border: 2.5px solid var(--gris-borde); margin-bottom: 10px; overflow: hidden; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; gap: 8px; }
    .admin-titulo { font-size: 0.88rem; font-weight: 800; color: var(--texto); display: flex; align-items: center; gap: 8px; }
    .admin-body {
      padding: 10px 16px; border-top: 2px dashed var(--gris-borde);
      display: flex; align-items: center; gap: 8px; background: var(--gris); flex-wrap: wrap;
    }
    .admin-body label { font-size: 0.8rem; color: var(--texto-suave); font-weight: 700; }
    .btn-calcular {
      margin-top: 1rem; width: 100%; padding: 14px;
      background: var(--naranja); color: white; border: none; border-radius: 14px;
      font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 900;
      cursor: pointer; transition: all 0.15s; box-shadow: 0 4px 0 #c04410;
    }
    .btn-calcular:hover { background: #e55a20; transform: translateY(-1px); }
    .btn-calcular:active { transform: translateY(3px); box-shadow: none; }
    .badge-estado { font-size: 0.7rem; font-weight: 800; padding: 3px 10px; border-radius: 20px; }
    .estado-pendiente { background: var(--gris); color: var(--texto-suave); }
    .estado-en_juego { background: #dbeafe; color: #1e40af; }
    .estado-finalizado { background: var(--verde-claro); color: #0f7a4a; }

    /* ══ LOADING ══ */
    .loading { text-align: center; padding: 3rem; color: rgba(255,255,255,0.45); font-size: 0.95rem; font-weight: 700; }

    /* ══ LEYENDA ══ */
    .leyenda { margin-top: 1rem; font-size: 0.78rem; color: rgba(255,255,255,0.45); font-weight: 700; text-align: center; }

    /* ══ TOAST ══ */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--negro); color: white;
      padding: 12px 22px; border-radius: 30px;
      font-size: 0.9rem; font-weight: 800;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      z-index: 999; white-space: nowrap;
      border: 2px solid var(--amarillo);
    }
    .toast.visible { transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .equipo-bandera-img { width: 36px; height: 24px; }
      .equipo-nombre { font-size: 0.68rem; max-width: 72px; }
      .score-input { width: 40px; height: 36px; font-size: 1rem; }
    }
  </style>
</head>

    "Cape Verde Islands": { es: "Cabo Verde", flag: "cv" },

    "Uruguay": { es: "Uruguay", flag: "uy" },
    "France": { es: "Francia", flag: "fr" },

    "Jordan": { es: "Jordania", flag: "jo" },

  };

  function obtenerInfoEquipo(nombreIngles) {
    if (!nombreIngles || nombreIngles === "Por definir" || nombreIngles.includes("definir")) {
      return { nombre: "Por definir", banderaHtml: `<span style="font-size: 1.6rem; line-height:1;">🏳️</span>` };
    }
    const datos = mapaEquipos[nombreIngles];
    if (datos) {
      return {
        nombre: datos.es,
        banderaHtml: `<img src="https://flagcdn.com/w80/${datos.flag}.png" class="equipo-bandera-img" alt="${datos.es}">`
      };
    }
    return { nombre: nombreIngles, banderaHtml: `<span style="font-size: 1.6rem; line-height:1;">⚽</span>` };
  }

  // 🔒 Función blindada para Safari (Usa enteros nativos para evitar fallos de parseo)
  function esFechaLimiteExcedida() {
    // Año, Mes (0-indexed: 5 es Junio), Día, Hora, Minutos, Segundos
    const fechaLimite = new Date(2026, 5, 11, 0, 0, 0);
    return Date.now() >= fechaLimite;
  }

  function obtenerRangoBizarro(pts, pos, total) {
    if (pos === 1) return "👑 Dios Waltner del Fulbo";
    if (pos === 2) return "🥈 Segundón Cebollita";
    if (pos === total && total > 1) return "🤡 Paga el Asado (Burro)";
    if (pts === 0) return "🥶 Pecho Frío Criogénico";
    if (pts < 4) return "🪵 Tronco / Juegue al Ajedrez";
    return "🧉 Viejito Táctico";
  }

  function toast(msg, dur = 2800) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("visible");
    setTimeout(() => t.classList.remove("visible"), dur);
  }

  // 🛠️ Formateador inmune a Safari (Limpia espacios espurios antes de parsear)
  function formatFecha(iso) {
    if (!iso) return "A confirmar";
    const cadenaLimpia = String(iso).replace(/ /g, "T");
    const d = new Date(cadenaLimpia);
    if (isNaN(d.getTime())) return "Fecha a confirmar";
    return d.toLocaleDateString("es-AR", { weekday: "short", day: "numeric", month: "short" })
      + " · " + d.toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" });
  }

  function calcularPuntos(pron, real) {
    if (real.goles_A === null || real.goles_B === null) return null;
    if (pron.goles_A === undefined || pron.goles_B === undefined) return null;
    const pA = Number(pron.goles_A), pB = Number(pron.goles_B);
    const rA = Number(real.goles_A), rB = Number(real.goles_B);
    if (pA === rA && pB === rB) return 3;
    if (Math.sign(pA - pB) === Math.sign(rA - rB)) return 1;
    return 0;
  }

  // 🔙 Volvemos al Popup nativo para resguardar la sesión en móviles
  document.getElementById("btn-google-login").addEventListener("click", async () => {
    try { await signInWithPopup(auth, provider); }
    catch (e) { console.error(e); toast("❌ Error al iniciar sesión"); }
  });
  document.getElementById("btn-logout").addEventListener("click", () => signOut(auth));

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById("view-login").style.display = "none";
      document.getElementById("app").style.display = "block";
      const initials = (user.displayName || user.email || "?")
        .split(" ").map(n => n[0]).join("").slice(0, 2).toUpperCase();
      document.getElementById("user-avatar").textContent = initials;

      await update(ref(db, `usuarios/${user.uid}`), {
          nombre: user.displayName || user.email,
          email: user.email,
          foto: user.photoURL || ""
      }); 

      if (ADMIN_UIDS.includes(user.uid)) {
        document.getElementById("tab-admin").style.display = "";
      }
      cargarTodo();
    } else {
      currentUser = null;
      document.getElementById("view-login").style.display = "flex";
      document.getElementById("app").style.display = "none";
    }
  });

  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("view-" + tab.dataset.tab).classList.add("active");
      
      const btnTodo = document.getElementById("btn-guardar-todo");
      if (tab.dataset.tab === "pronosticos") {
        btnTodo.style.display = "block";
      } else {
        btnTodo.style.display = "none";
      }

      if (tab.dataset.tab === "posiciones") renderPosiciones();
      if (tab.dataset.tab === "admin") renderAdmin();
    });
  });

  async function cargarTodo() {
    const [snapP, snapPr] = await Promise.all([
      get(ref(db, "partidos")),
      get(ref(db, `pronosticos/${currentUser.uid}`))
    ]);
    partidosCache = snapP.exists() ? snapP.val() : {};
    pronosticosCache = snapPr.exists() ? snapPr.val() : {};
    renderPronosticos();
  }

  function renderPronosticos() {
    const container = document.getElementById("view-pronosticos");
    container.innerHTML = "";

    const fraseEl = document.createElement("div");
    fraseEl.className = "frase-card";
    // 🐛 CORREGIDO: Se eliminó la línea duplicada con el error de tipeo
    fraseEl.textContent = frases[Math.floor(Math.random() * frases.length)];
    container.appendChild(fraseEl);

    // 🚀 Sort blindado para motores Safari (iOS)
    const partidos = Object.entries(partidosCache)
      .sort((a, b) => {
        const dateA = new Date(String(a[1].fecha).replace(/ /g, "T"));
        const dateB = new Date(String(b[1].fecha).replace(/ /g, "T"));
        return dateA - dateB;
      });

    if (!partidos.length) {
      const el = document.createElement("div");
      el.className = "loading";
      el.textContent = "No hay partidos cargados aún.";
      container.appendChild(el);
      return;
    }

    const limiteBloqueo = esFechaLimiteExcedida();
    let faseActual = null;

    partidos.forEach(([key, p]) => {
      if (!p || !p.equipo_A || !p.equipo_B || !p.fase) return;
      if (!p.fase.toLowerCase().includes("group") && !p.fase.toLowerCase().includes("grupo")) return;

      if (p.fase !== faseActual) {
        faseActual = p.fase;
        const lbl = document.createElement("div");
        lbl.className = "fase-label";
        lbl.textContent = "📌 " + p.fase;
        container.appendChild(lbl);
      }

      const eqA = obtenerInfoEquipo(p.equipo_A);
      const eqB = obtenerInfoEquipo(p.equipo_B);
      const pron = pronosticosCache[key] || {};
      const finalizado = p.estado === "finalizado";
      
      const deshabilitado = finalizado || limiteBloqueo;

      const pts = finalizado
        ? calcularPuntos(pron, { goles_A: p.goles_A_real, goles_B: p.goles_B_real })
        : null;

      let badgePts = "";
      if (pts === 3) badgePts = `<span class="badge-pts pts-3">⭐ ¡3 puntos!</span>`;
      else if (pts === 1) badgePts = `<span class="badge-pts pts-1">✓ 1 punto</span>`;
      else if (pts === 0 && finalizado && pron.goles_A !== undefined)
        badgePts = `<span class="badge-pts pts-0">😬 0 pts</span>`;

      const vsBlock = finalizado
        ? `<div class="resultado-real">${p.goles_A_real} - ${p.goles_B_real}</div>`
        : `<div class="vs-texto">VS</div><div class="partido-fecha">${formatFecha(p.fecha)}</div>`;

      const miPronTexto = (pron.goles_A !== undefined && pron.goles_B !== undefined && finalizado)
        ? `<div class="mi-pron">Tu pron: ${pron.goles_A}-${pron.goles_B}</div>` : "";

      const card = document.createElement("div");
      card.className = "partido-card" + (finalizado ? " finalizado" : "");
      card.innerHTML = `
        <div class="partido-header">
          ${badgePts}
          <div class="equipo">
            <div class="equipo-bandera">${eqA.banderaHtml}</div>
            <div class="equipo-nombre">${eqA.nombre}</div>
          </div>
          <div class="vs-area">${vsBlock}${miPronTexto}</div>
          <div class="equipo">
            <div class="equipo-bandera">${eqB.banderaHtml}</div>
            <div class="equipo-nombre">${eqB.nombre}</div>
          </div>
        </div>
        <div class="pronostico-area">
          <div class="pronostico-label">Tu pronóstico</div>
          <div class="score-inputs">
            <input class="score-input" type="number" min="0" max="30"
              id="gA-${key}" value="${pron.goles_A ?? ''}" placeholder="0" ${deshabilitado ? 'disabled' : ''} />
            <span class="score-sep">-</span>
            <input class="score-input" type="number" min="0" max="30"
              id="gB-${key}" value="${pron.goles_B ?? ''}" placeholder="0" ${deshabilitado ? 'disabled' : ''} />
          </div>
          <button class="btn-guardar" id="btn-${key}" ${deshabilitado ? 'disabled' : ''}>
            ${finalizado ? '🔒 Cerrado' : (limiteBloqueo ? '🔒 Expiró' : '💾 Guardar')}
          </button>
        </div>`;
      container.appendChild(card);

      if (!deshabilitado) {
        document.getElementById(`btn-${key}`).addEventListener("click", () => guardarPronostico(key));
      }
    });
}

  async function guardarPronostico(key) {
    if (esFechaLimiteExcedida()) {
      toast("🔒 Tiempo agotado. El prode cerró el 10 de junio.");
      return;
    }
    const gA = document.getElementById(`gA-${key}`).value;
    const gB = document.getElementById(`gB-${key}`).value;
    if (gA === "" || gB === "") { toast("✍️ Completá ambos goles"); return; }
    const btn = document.getElementById(`btn-${key}`);
    btn.disabled = true; btn.textContent = "...";
    await set(ref(db, `pronosticos/${currentUser.uid}/${key}`), {
      goles_A: Number(gA), goles_B: Number(gB), timestamp: Date.now()
    });
    pronosticosCache[key] = { goles_A: Number(gA), goles_B: Number(gB) };
    btn.disabled = false; btn.textContent = "💾 Guardar";
    const msgs = ["🎯 ¡Guardado!", "🔥 ¡Dale que viene!", "🧠 ¡Gran análisis!", "⚽ ¡A rezar!"];
    toast(msgs[Math.floor(Math.random() * msgs.length)]);
  }

  document.getElementById("btn-guardar-todo").addEventListener("click", async () => {
    if (!currentUser) return;
    if (esFechaLimiteExcedida()) {
      toast("🔒 Tiempo agotado. No podés guardar pronósticos.");
      return;
    }
    const updates = {};
    let contadorCargados = 0;

    Object.entries(partidosCache).forEach(([key, p]) => {
      if (!p || !p.fase) return;
      if (!p.fase.toLowerCase().includes("group") && !p.fase.toLowerCase().includes("grupo")) return;
      if (p.estado === "finalizado") return;

      const inputA = document.getElementById(`gA-${key}`);
      const inputB = document.getElementById(`gB-${key}`);
      if (!inputA || !inputB) return;

      const gA = inputA.value;
      const gB = inputB.value;

      if (gA !== "" && gB !== "") {
        updates[`pronosticos/${currentUser.uid}/${key}`] = {
          goles_A: Number(gA),
          goles_B: Number(gB),
          timestamp: Date.now()
        };
        pronosticosCache[key] = { goles_A: Number(gA), goles_B: Number(gB) };
        contadorCargados++;
      }
    });

    if (contadorCargados === 0) {
      toast("✍️ No metiste ningún pálpito nuevo, che");
      return;
    }

    try {
      await update(ref(db), updates);
      toast(`🚀 ¡${contadorCargados} pálpitos guardados en lote! 🔥`);
      renderPronosticos();
    } catch (e) {
      console.error(e);
      toast("❌ Error al guardar en lote");
    }
  });

  async function renderPosiciones() {
    const container = document.getElementById("view-posiciones");
    container.innerHTML = '<div class="loading">Calculando el ranking...</div>';

    const [snapU, snapP, snapPr] = await Promise.all([
      get(ref(db, "usuarios")),
      get(ref(db, "partidos")),
      get(ref(db, "pronosticos"))
    ]);

    const usuarios = snapU.exists() ? snapU.val() : {};
    const partidos = snapP.exists() ? snapP.val() : {};
    const pronTodos = snapPr.exists() ? snapPr.val() : {};
    
    const finalizados = Object.entries(partidos).filter(([, p]) => 
      p && p.estado === "finalizado" && (p.fase.toLowerCase().includes("group") || p.fase.toLowerCase().includes("grupo"))
    );

    const tabla = Object.entries(usuarios).map(([uid, u]) => {
      const mis = pronTodos[uid] || {};
      let pts = 0, exactos = 0, ganadores = 0, jugados = 0;
      finalizados.forEach(([key, p]) => {
        const pr = mis[key];
        if (!pr) return;
        const r = calcularPuntos(pr, { goles_A: p.goles_A_real, goles_B: p.goles_B_real });
        if (r === null) return;
        jugados++; pts += r;
        if (r === 3) exactos++;
        if (r >= 1) ganadores++;
      });
      return { uid, nombre: u.nombre || u.email, pts, exactos, ganadores, jugados };
    }).sort((a, b) => b.pts - a.pts || b.exactos - a.exactos);

    container.innerHTML = "";

    if (tabla.length > 0) {
      const lider = tabla[0];
      const esYoLider = lider.uid === currentUser.uid;
      const frasePos = esYoLider
        ? `👑 ¡Vas primero, ${lider.nombre.split(" ")[0]}! No aflojes.`
        : `👑 ${lider.nombre.split(" ")[0]} lidera con ${lider.pts} pts. ¿Lo podés alcanzar?`;
      const fc = document.createElement("div");
      fc.className = "frase-card";
      fc.textContent = frasePos;
      container.appendChild(fc);
    }

    const titulo = document.createElement("p");
    titulo.className = "seccion-titulo";
    titulo.textContent = "🏆 Tabla de Posiciones";
    container.appendChild(titulo);

    const wrap = document.createElement("div");
    wrap.className = "tabla-pos";
    const medallas = ["🥇", "🥈", "🥉"];

    const rows = tabla.map((u, i) => {
      const pos = i + 1;
      const clasePos = pos <= 3 ? `pos-${pos}` : "pos-n";
      const esMio = u.uid === currentUser.uid;
      const posLabel = pos <= 3 ? medallas[i] : pos;
      const rangoBizarro = obtenerRangoBizarro(u.pts, pos, tabla.length);

      return `<tr class="${esMio ? 'yo-row' : ''}">
        <td>
          <span class="pos-num ${clasePos}">${posLabel}</span>
          <div style="display: inline-flex; flex-direction: column; vertical-align: middle;">
            <span style="font-weight: 800;">${u.nombre.split(" ")[0]}${esMio ? ' 👈' : ''}</span>
            <span style="font-size: 0.65rem; color: var(--texto-suave); font-weight: bold; text-transform: uppercase;">${rangoBizarro}</span>
          </div>
        </td>
        <td class="pts-total">${u.pts}</td>
        <td>⭐ ${u.exactos}</td>
        <td>✓ ${u.ganadores}</td>
        <td>${u.jugados}</td>
      </tr>`;
    }).join("");

    wrap.innerHTML = `<table>
      <thead><tr>
        <th>Jugador</th><th>Puntos</th><th>Exactos</th><th>Ganador</th><th>Jugados</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
    container.appendChild(wrap);

    const leyenda = document.createElement("div");
    leyenda.className = "leyenda";
    leyenda.textContent = "⭐ Resultado exacto = 3 pts · ✓ Acertar ganador = 1 pt";
    container.appendChild(leyenda);
  }

  function renderAdmin() {
    const container = document.getElementById("admin-partidos-list");
    container.innerHTML = "";
    
    // 🚀 Sort también blindado para la sección de administración
    const partidos = Object.entries(partidosCache)
      .sort((a, b) => {
        const dateA = new Date(String(a[1].fecha).replace(/ /g, "T"));
        const dateB = new Date(String(b[1].fecha).replace(/ /g, "T"));
        return dateA - dateB;
      });

    partidos.forEach(([key, p]) => {
      if (!p || !p.equipo_A || !p.equipo_B || !p.fase) return;
      if (!p.fase.toLowerCase().includes("group") && !p.fase.toLowerCase().includes("grupo")) return;

      const eqA = obtenerInfoEquipo(p.equipo_A);
      const eqB = obtenerInfoEquipo(p.equipo_B);

      const card = document.createElement("div");
      card.className = "admin-card";
      const estadoClass = `estado-${(p.estado || "pendiente").replace(" ", "_")}`;
      card.innerHTML = `
        <div class="admin-header">
          <div class="admin-titulo">
            ${eqA.banderaHtml} <span>${eqA.nombre} vs ${eqB.nombre}</span> ${eqB.banderaHtml}
          </div>
          <span class="badge-estado ${estadoClass}">${p.estado || "pendiente"}</span>
        </div>
        <div class="admin-body">
          <label>Resultado:</label>
          <input class="score-input" type="number" min="0" id="adm-gA-${key}" value="${p.goles_A_real ?? ''}" placeholder="0" />
          <span class="score-sep">-</span>
          <input class="score-input" type="number" min="0" id="adm-gB-${key}" value="${p.goles_B_real ?? ''}" placeholder="0" />
          <button class="btn-guardar" id="adm-btn-${key}">✅ Guardar</button>
        </div>`;
      container.appendChild(card);
      document.getElementById(`adm-btn-${key}`).addEventListener("click", () => guardarResultado(key));
    });
  }

  async function guardarResultado(key) {
    const gA = document.getElementById(`adm-gA-${key}`).value;
    const gB = document.getElementById(`adm-gB-${key}`).value;
    if (gA === "" || gB === "") { toast("✍️ Completá ambos goles"); return; }
    await update(ref(db, `partidos/${key}`), {
      goles_A_real: Number(gA), goles_B_real: Number(gB), estado: "finalizado"
    });
    partidosCache[key].goles_A_real = Number(gA);
    partidosCache[key].goles_B_real = Number(gB);
    partidosCache[key].estado = "finalizado";
    toast(`✅ ${gA} - ${gB} guardado 🔥`);
    renderAdmin();
  }

  document.getElementById("btn-recalcular").addEventListener("click", async () => {
    await cargarTodo();
    toast("🔄 Todo actualizado");
  });

  document.getElementById("btn-whatsapp").addEventListener("click", async () => {
    const [snapU, snapP, snapPr] = await Promise.all([
      get(ref(db, "usuarios")), get(ref(db, "partidos")), get(ref(db, "pronosticos"))
    ]);
    
    const usuarios = snapU.exists() ? snapU.val() : {};
    const partidos = snapP.exists() ? snapP.val() : {};
    const pronTodos = snapPr.exists() ? snapPr.val() : {};
    
    const finalizados = Object.entries(partidos).filter(([, p]) => 
      p && p.estado === "finalizado" && (p.fase.toLowerCase().includes("group") || p.fase.toLowerCase().includes("grupo"))
    );

    const tabla = Object.entries(usuarios).map(([uid, u]) => {
      let pts = 0;
      finalizados.forEach(([key, p]) => {
        if (pronTodos[uid]?.[key]) pts += calcularPuntos(pronTodos[uid][key], { goles_A: p.goles_A_real, goles_B: p.goles_B_real }) || 0;
      });
      return { nombre: u.nombre || u.email, pts };
    }).sort((a, b) => b.pts - a.pts);

    if (!tabla.length) return toast("No hay nadie en la tabla todavía");

    let mensaje = `🏆 *PRODE CLAN WALTNER - ESTADO DE SITUACIÓN* ⚽\n\n`;
    mensaje += `Se cerró la jornada y la interna familiar está que arde. Así vienen las cosas:\n\n`;
    
    tabla.forEach((u, i) => {
      const medallas = ["🥇", "🥈", "🥉"];
      const icono = i <= 2 ? medallas[i] : "🏃‍♂️";
      mensaje += `${icono} *${i+1}° ${u.nombre.split(" ")[0]}:* ${u.pts} pts\n`;
    });

    mensaje += `\n🔥 *Líder:* ${tabla[0].nombre.split(" ")[0]} (anda agrandado).\n`;
    if(tabla.length > 1) {
      mensaje += `🤡 *Último cómodo:* ${tabla[tabla.length - 1].nombre.split(" ")[0]} (andá prendiendo el fuego para el asado).\n`;
    }

    const urlUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(mensaje)}`;
    window.open(urlUrl, "_blank");
  });
</script>
